name: Build Deskbuddy Firmware

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tagler atıldığında çalışır (Örn: v1.6.0)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1.1.2

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "ArduinoJson"
          arduino-cli lib install "TFT_eSPI"
          arduino-cli lib install "XPT2046_Touchscreen"

      # NOT: Eger kisisellestirilmis TFT_eSPI ayarlarin (User_Setup.h) varsa,
      # bu asamada o dosyayi kutuphaneye kopyalayan bir adim eklemen gerekebilir.

      - name: Compile Sketch
        run: |
          # FQBN ayari standart ESP32 Dev Module (esp32:esp32:esp32) olarak ayarlandi.
          arduino-cli compile --fqbn esp32:esp32:esp32 Deskbuddy.ino --output-dir build

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: build/Deskbuddy.ino.bin
        env:
          GITHUB_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
